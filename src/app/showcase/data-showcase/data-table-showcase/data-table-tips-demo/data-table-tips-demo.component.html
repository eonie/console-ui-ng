<div class="top-bread">
    <nz-breadcrumb class="bread">
        <nz-breadcrumb-item>
            您所在位置：
        </nz-breadcrumb-item>
        <nz-breadcrumb-item>
            组织考试
        </nz-breadcrumb-item>
        <nz-breadcrumb-item>
            考试管理
        </nz-breadcrumb-item>
    </nz-breadcrumb>
    <div class="page-header">
        <h5 class="page-title"><small>考试列表</small></h5>
    </div>
</div>
<cui-data-table [columns]="columns" [data]="data">
    <ng-template cuiColTpl="name" let-row="row">
        <a nz-tooltip [nzPlacement]="'right'" [nzTitle]="nameTpl">{{row.name}}</a>
        <ng-template #nameTpl>
            <p>{{row.name}}</p>
        </ng-template>
    </ng-template>
    <ng-template cuiColTpl="budget" let-row="row">
        <a nz-tooltip [nzPlacement]="'right'" [nzTitle]="budgetTpl">{{row.budget}}</a>
        <ng-template #budgetTpl>
            <p>培训机动预算：{{row.budget}}</p>
            <p>研发预算：{{row.budget}}</p>
        </ng-template>
    </ng-template>
    <ng-template cuiColTpl="address" let-row="row">
        <a nz-tooltip [nzPlacement]="'right'" [nzTitle]="addressTpl">{{row.address}}</a>
        <ng-template #addressTpl>
            <p>旧地址：{{row.address}}</p>
            <p>新地址：{{row.address}}</p>
        </ng-template>
    </ng-template>
</cui-data-table>
